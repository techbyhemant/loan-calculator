name: LastEMI Daily Blog Engine

on:
  schedule:
    # Runs daily at 4:00 AM UTC = 9:30 AM IST
    - cron: '0 4 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run intelligent blog scheduler
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: npx tsx scripts/blog/autonomous/scheduler.ts

      - name: Check for new content
        id: check
        run: |
          if [[ -n $(git status --porcelain content/ public/images/blog/ data/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New blog content generated"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new content this run"
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "LastEMI Blog Bot"
          git config user.email "bot@lastemi.com"
          git add content/ public/images/blog/ data/

          SLUG=$(git diff --cached --name-only | grep "content/blog" | head -1 | sed 's|content/blog/||; s|.mdx||')

          git commit -m "blog: ${SLUG:-daily-update} [auto]

          Generated by LastEMI Intelligent Blog Engine
          $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push

      - name: Submit new URLs to IndexNow
        if: steps.check.outputs.has_changes == 'true'
        run: npx tsx scripts/seo/submit-indexnow.ts

      - name: Summary
        if: always()
        run: |
          echo "=== Blog Engine Summary ==="
          echo "Date: $(date -u +'%Y-%m-%d %H:%M UTC')"
          if [ -f data/publish-log.json ]; then
            TOTAL=$(cat data/publish-log.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8'));console.log(d.length)" 2>/dev/null || echo "0")
            echo "Total posts published: $TOTAL"
          fi
          if [ -f data/blog-queue.json ]; then
            QUEUED=$(cat data/blog-queue.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8'));console.log(d.length)" 2>/dev/null || echo "0")
            echo "Posts in queue: $QUEUED"
          fi
          ls content/blog/*.mdx 2>/dev/null | wc -l | xargs -I{} echo "MDX files on disk: {}"
