name: LastEMI Autonomous Blog Engine

on:
  schedule:
    - cron: '0 1 * * 1,3,5'

  workflow_dispatch:
    inputs:
      force_generate:
        description: 'Force generate even if weekly limit reached'
        required: false
        default: 'false'

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run blog scheduler
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: npx tsx scripts/blog/autonomous/scheduler.ts

      - name: Check if new files were generated
        id: check_files
        run: |
          if git status --porcelain | grep -q "content/blog\|public/images/blog\|data/"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New blog content detected"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new content generated"
          fi

      - name: Commit and push generated content
        if: steps.check_files.outputs.has_changes == 'true'
        run: |
          git config --local user.email "blog-bot@lastemi.com"
          git config --local user.name "LastEMI Blog Bot"
          git add content/blog/ public/images/blog/ data/

          SLUG=$(git diff --cached --name-only | grep "content/blog" | head -1 | sed 's|content/blog/||' | sed 's|.mdx||')

          git commit -m "blog: auto-generate ${SLUG}

          Generated by LastEMI Autonomous Blog Engine
          Date: $(date -u +'%Y-%m-%d %H:%M UTC')
          Trigger: Scheduled cron job"

          git push

      - name: Log results
        if: always()
        run: |
          echo "Workflow completed at $(date -u)"
          echo "Queue stats:"
          cat data/blog-queue.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8'));console.log('  Total queued:',d.length)" 2>/dev/null || echo "  Queue file not found"
